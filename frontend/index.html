<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#ffffff">
  <title>Beauty Studio</title>

  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">
</head>
<body>
  <!-- App Root -->
  <div id="app">
    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
      <div class="loading-logo">
        <div class="loading-icon">✦</div>
        <div class="loading-text">Beauty Studio</div>
      </div>
      <div class="loading-spinner"></div>
    </div>

    <!-- Main App (hidden until loaded) -->
    <div id="main-app" class="main-app hidden">
      <!-- Header -->
      <header id="app-header" class="app-header">
        <button id="back-btn" class="back-btn hidden" onclick="App.goBack()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
        </button>
        <div class="header-title" id="header-title">Beauty Studio</div>
        <div class="header-actions" id="header-actions"></div>
      </header>

      <!-- Page Container -->
      <main id="page-container" class="page-container"></main>

      <!-- Bottom Navigation - Premium Redesign -->
      <nav id="bottom-nav" class="bottom-nav">
        <button class="nav-item active" data-page="home" onclick="App.navigate('home')">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M9 22V12h6v10" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>Главная</span>
        </button>
        <button class="nav-item" data-page="book" onclick="App.navigate('book')">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>Запись</span>
        </button>
        <button class="nav-item" data-page="bookings" onclick="App.navigate('bookings')">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M12 12h.01M8 12h.01M16 12h.01" stroke-width="2"/>
          </svg>
          <span>Записи</span>
        </button>
        <button class="nav-item" data-page="portfolio" onclick="App.navigate('portfolio')">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/>
            <path d="M21 15l-5-5L5 21" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>Портфолио</span>
        </button>
        <button class="nav-item" data-page="profile" onclick="App.navigate('profile')">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="12" cy="7" r="4" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <span>Профиль</span>
        </button>
      </nav>
    </div>
  </div>

  <!-- Toast Notifications -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Modal Overlay -->
  <div id="modal-overlay" class="modal-overlay hidden" onclick="Modal.close()"></div>
  <div id="modal-container" class="modal-container hidden"></div>

  <!-- Scripts -->
  <script src="js/config.js"></script>
  <script src="js/api.js"></script>
  <script src="js/store.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/components.js"></script>
  <script src="js/pages/home.js"></script>
  <script src="js/pages/book.js"></script>
  <script src="js/pages/bookings.js"></script>
  <script src="js/pages/portfolio.js"></script>
  <script src="js/pages/profile.js"></script>
  <script src="js/pages/master.js"></script>
  <script src="js/pages/admin.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
