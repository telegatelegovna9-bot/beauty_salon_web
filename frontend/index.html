<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#0F0F1A">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Beauty Studio ✨</title>

  <!-- Telegram WebApp SDK -->
  <script src="https://telegram.org/js/telegram-web-app.js"></script>

  <!-- Modern Fonts - Poppins for youth style -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/animations.css">

  <!-- Favicon -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💅</text></svg>">
</head>
<body>
  <!-- App Root -->
  <div id="app">
    <!-- Loading Screen -->
    <div id="loading-screen" class="loading-screen">
      <div class="loading-logo">
        <div class="loading-icon">💅</div>
        <div class="loading-text">Beauty Studio</div>
        <div style="color: rgba(255,255,255,0.5); font-size: 14px; margin-top: 8px;">Загрузка...</div>
      </div>
      <div class="loading-spinner"></div>
      <!-- Animated background circles -->
      <div style="position: absolute; width: 300px; height: 300px; border-radius: 50%; background: rgba(255,107,157,0.1); animation: pulse 3s ease-in-out infinite;"></div>
      <div style="position: absolute; width: 200px; height: 200px; border-radius: 50%; background: rgba(196,77,255,0.1); animation: pulse 3s ease-in-out infinite 1s;"></div>
    </div>

    <!-- Main App (hidden until loaded) -->
    <div id="main-app" class="main-app hidden">
      <!-- Header -->
      <header id="app-header" class="app-header">
        <button id="back-btn" class="back-btn hidden" onclick="App.goBack()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 12H5"/>
            <path d="M12 19l-7-7 7-7"/>
          </svg>
        </button>
        <div class="header-title" id="header-title">
          <span style="font-size: 20px;">💅</span> Beauty Studio
        </div>
        <div class="header-actions" id="header-actions"></div>
      </header>

      <!-- Page Container -->
      <main id="page-container" class="page-container"></main>

      <!-- Bottom Navigation -->
      <nav id="bottom-nav" class="bottom-nav">
        <button class="nav-item active" data-page="home" onclick="App.navigate('home')">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
          <span>Главная</span>
        </button>
        <button class="nav-item" data-page="book" onclick="App.navigate('book')">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
            <line x1="16" y1="2" x2="16" y2="6"/>
            <line x1="8" y1="2" x2="8" y2="6"/>
            <line x1="3" y1="10" x2="21" y2="10"/>
          </svg>
          <span>Запись</span>
        </button>
        <button class="nav-item" data-page="bookings" onclick="App.navigate('bookings')">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
            <polyline points="14 2 14 8 20 8"/>
            <line x1="16" y1="13" x2="8" y2="13"/>
            <line x1="16" y1="17" x2="8" y2="17"/>
          </svg>
          <span>Записи</span>
        </button>
        <button class="nav-item" data-page="portfolio" onclick="App.navigate('portfolio')">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          <span>Портфолио</span>
        </button>
        <button class="nav-item" data-page="profile" onclick="App.navigate('profile')">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>
          <span>Профиль</span>
        </button>
      </nav>
    </div>
  </div>

  <!-- Toast Notifications -->
  <div id="toast-container" class="toast-container"></div>

  <!-- Modal Overlay -->
  <div id="modal-overlay" class="modal-overlay hidden" onclick="App.closeModal(event)">
    <div id="modal-content" class="modal"></div>
  </div>

  <!-- Scripts -->
  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/store.js"></script>
  <script src="js/api.js"></script>
  <script src="js/components.js"></script>
  <script src="js/pages/home.js"></script>
  <script src="js/pages/book.js"></script>
  <script src="js/pages/bookings.js"></script>
  <script src="js/pages/portfolio.js"></script>
  <script src="js/pages/profile.js"></script>
  <script src="js/pages/master.js"></script>
  <script src="js/pages/admin.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
